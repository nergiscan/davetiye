<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nergis & Can</title>

<meta name="description" content="Kına · 22 Mayıs · Erdal İnönü Parkı · Nikah · 23 Mayıs · Antalya Kartpostalı">

<meta property="og:type" content="website">
<meta property="og:title" content="Nergis & Can">
<meta property="og:description" content="Kına · 22 Mayıs · Erdal İnönü Parkı · Nikah · 23 Mayıs · Antalya Kartpostalı">
<meta property="og:image" content="https://nergiscan.github.io/davetiye/davetiye.png">
<meta property="og:url" content="https://nergiscan.github.io/davetiye/">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  font-family:'Montserrat',sans-serif;
  color:#6b5d3a;
  background-image:url('bg-texture.jpeg');
  background-repeat:repeat-y;
  background-position:top center;
  background-size:520px auto;
  background-color:#f2efde;
}

.page{
  max-width:520px;
  margin:0 auto;
}

/* ÜST + SOFT FADE */
.invite-wrap{
  position:relative;
}

.invite-wrap img{
  width:100%;
  display:block;
}

.invite-wrap::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:140px;
  background:linear-gradient(
    to bottom,
    rgba(242,239,222,0) 0%,
    rgba(242,239,222,0.75) 60%,
    #f2efde 100%
  );
  pointer-events:none;
}

/* ALT */
.info{
  padding:50px 28px 60px;
  text-align:center;
}

.event-block{
  margin-bottom:12px;
}

.event-title{
  font-size:13px;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:12px;
}

.event-title .dash{
  margin:0 8px;
  color:#8a7a4f;
}

.location-name{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;
  margin-bottom:10px;
}

.location-sub{
  font-size:10px;
  letter-spacing:3px;
  margin-bottom:24px;
  text-transform:uppercase;
  opacity:.7;
}

.map-wrap{
  max-width:440px;
  margin:0 auto 22px;
  border:1px solid rgba(160,140,90,.25);
  filter:sepia(.2) brightness(.98);
}

.map-wrap iframe{
  width:100%;
  height:240px;
  border:0;
}

.location-btn{
  display:inline-block;
  padding:13px 32px;
  border:1px solid #b0a070;
  text-decoration:none;
  font-size:11px;
  letter-spacing:4px;
  color:#5d4f30;
  transition:.25s;
}

.location-btn:hover{
  background:#b0a070;
  color:#f2efde;
}

.separator{
  width:60px;
  height:1px;
  background:#c9b87a;
  margin:60px auto;
}

@media(max-width:420px){
  .map-wrap iframe{height:210px}
  .event-title{font-size:11px;letter-spacing:3px}
  .location-name{font-size:21px}
}
</style>
</head>

<body>

<div class="page">

  <div class="invite-wrap">
    <img src="davetiye.png" alt="Davetiye">
  </div>

  <div class="info">

    <div class="event-block">
      <div class="event-title">Kına<span class="dash">—</span>22 Mayıs 2026<span class="dash">—</span>19:00</div>
      <div class="location-name">Erdal İnönü Parkı</div>
      <div class="location-sub">Muratpaşa / Antalya</div>

      <div class="map-wrap">
        <iframe src="https://maps.google.com/maps?q=36.862070590326766,30.7274970006144&hl=tr&z=17&output=embed"></iframe>
      </div>

      <a href="https://www.google.com/maps/search/?api=1&query=36.862070590326766,30.7274970006144" target="_blank" class="location-btn">Konuma Git</a>
    </div>

    <div class="separator"></div>

    <div class="event-block">
      <div class="event-title">Nikah<span class="dash">—</span>23 Mayıs 2026<span class="dash">—</span>18:00</div>
      <div class="location-name">Antalya Kartpostalı</div>
      <div class="location-sub">Şirinyalı, Lara Cd. Muratpaşa / Antalya</div>

      <div class="map-wrap">
        <iframe src="https://maps.google.com/maps?q=36.86257483601452,30.726320613140093&hl=tr&z=17&output=embed"></iframe>
      </div>

      <a href="https://www.google.com/maps/search/?api=1&query=36.86257483601452,30.726320613140093" target="_blank" class="location-btn">Konuma Git</a>
    </div>

  </div>
</div>

</body>
</html>
