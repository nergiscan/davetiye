<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nergis & Can</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #f9f4ee url('bg-texture.png') repeat;
    font-family: 'Montserrat', sans-serif;
    color: #6b5d4a;
    min-height: 100vh;
  }
  .page {
    max-width: 520px;
    margin: 0 auto;
    background: #f9f4ee url('bg-texture.png') repeat;
    min-height: 100vh;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }
  .invite-image {
    width: 100%;
    display: block;
  }
  .info {
    padding: 40px 28px 60px;
    text-align: center;
  }
  .event-block {
    margin-bottom: 12px;
  }
  .event-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    letter-spacing: 2px;
    color: #6b5d4a;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-weight: 500;
  }
  .location-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    color: #8a7960;
    margin-bottom: 4px;
  }
  .location-sub {
    font-size: 11px;
    letter-spacing: 2px;
    color: #a59078;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .map-wrap {
    width: 100%;
    max-width: 440px;
    margin: 0 auto 18px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(107, 93, 74, 0.15);
    border: 1px solid rgba(184, 168, 144, 0.3);
  }
  .map-wrap iframe {
    display: block;
    width: 100%;
    height: 240px;
    border: 0;
  }
  .location-btn {
    display: inline-block;
    padding: 13px 30px;
    background: transparent;
    color: #6b5d4a;
    border: 1px solid #b8a890;
    border-radius: 2px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .location-btn:hover {
    background: #b8a890;
    color: #f9f4ee;
  }
  .separator {
    width: 60px;
    height: 1px;
    background: #d4c2a0;
    margin: 56px auto;
  }
  @media (max-width: 420px) {
    .map-wrap iframe { height: 210px; }
    .event-title { font-size: 15px; letter-spacing: 1.5px; }
  }
</style>
</head>
<body>
  <div class="page">
    <img src="davetiye.png" alt="Nergis & Can Davetiye" class="invite-image">

    <div class="info">

      <!-- KINA -->
      <div class="event-block">
        <div class="event-title">Kına · 22 Mayıs 2026 · 19:00</div>
        <div class="location-name">Erdal İnönü Parkı</div>
        <div class="location-sub">Muratpaşa · Antalya</div>

        <div class="map-wrap">
          <iframe
            src="https://maps.google.com/maps?q=36.862070590326766,30.7274970006144&hl=tr&z=17&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen></iframe>
        </div>

        <a href="https://www.google.com/maps/search/?api=1&query=36.862070590326766,30.7274970006144" target="_blank" rel="noopener" class="location-btn">Konuma Git</a>
      </div>

      <div class="separator"></div>

      <!-- NIKAH -->
      <div class="event-block">
        <div class="event-title">Nikah · 23 Mayıs 2026 · 18:00</div>
        <div class="location-name">Antalya Kartpostalı</div>
        <div class="location-sub">Şirinyalı, Lara Cd. · Muratpaşa</div>

        <div class="map-wrap">
          <iframe
            src="https://maps.google.com/maps?q=36.86257483601452,30.726320613140093&hl=tr&z=17&output=embed"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen></iframe>
        </div>

        <a href="https://www.google.com/maps/search/?api=1&query=36.86257483601452,30.726320613140093" target="_blank" rel="noopener" class="location-btn">Konuma Git</a>
      </div>

    </div>
  </div>
</body>
</html>
